services:
  - type: web
    name: projectlens-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: DB_HOST
        fromDatabase:
          name: projectlens-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: projectlens-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: projectlens-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: projectlens-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: projectlens-db
          property: password

databases:
  - name: projectlens-db
    plan: free
    databaseName: projectlens
    user: projectlens
