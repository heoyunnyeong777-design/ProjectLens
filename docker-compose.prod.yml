version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: projectlens-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    networks:
      - projectlens-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projectlens-backend
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      - postgres
    restart: always
    networks:
      - projectlens-net

  frontend:
    build:
      context: ../ProjectLens-front
      dockerfile: Dockerfile
    container_name: projectlens-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    networks:
      - projectlens-net

networks:
  projectlens-net:
    driver: bridge

volumes:
  pgdata:
